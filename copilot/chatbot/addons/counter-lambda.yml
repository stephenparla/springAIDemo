Parameters:
  App:
    Type: String
  Env:
    Type: String
  Name:
    Type: String

Resources:
  LambdaCounterRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ://amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:UpdateItem
                Resource: !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${App}-${Env}-${Name}-UsersTable"

  UserCounterFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: "index.lambda_handler"
      Runtime: "python3.12"
      Role: !GetAtt LambdaCounterRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Sub "${App}-${Env}-${Name}-UsersTable"
      Code:
        ZipFile: |
          import boto3
          import os
          import json

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table(os.environ['TABLE_NAME'])

          def lambda_handler(event, context):
              try:
                  table.update_item(
                      Key={'StatId': 'total_unique_visitors'},
                      UpdateExpression="ADD visit_count :inc",
                      ExpressionAttributeValues={':inc': 1}
                  )
                  return {'statusCode': 200, 'body': '{"status":"ok"}'}
              except Exception as e:
                  print(e)
                  return {'statusCode': 500, 'body': str(e)}

  # 🌟 FIXED: Added DependsOn to prevent the 'failed to create' error
  UserCounterFunctionUrl:
    Type: AWS::Lambda::Url
    DependsOn: UserCounterFunction
    Properties:
      TargetFunctionArn: !Ref UserCounterFunction
      AuthType: NONE

  UserCounterFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref UserCounterFunction
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      FunctionUrlAuthType: NONE

Outputs:
  # This output will show up in your terminal after 'copilot svc deploy'
  CounterLambdaUrl:
    Value: !GetAtt UserCounterFunctionUrl.FunctionUrl
