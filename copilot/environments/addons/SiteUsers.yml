Parameters:
  App:
    Type: String
    Description: Your application's name.
  Env:
    Type: String
    Description: The name of the environment being deployed.

Resources:
  SiteUsers:
    Metadata:
      'aws:copilot:description': 'An Amazon DynamoDB table for SiteUsers'
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${App}-${Env}-SiteUsers
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: "S"
        - AttributeName: loginDate
          AttributeType: "S"
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: loginDate
          KeyType: RANGE

Outputs:
  SiteUsersName:
    Description: "The name of this DynamoDB table."
    Value: !Ref SiteUsers
    Export: 
      Name: !Sub ${App}-${Env}-SiteUsersTableName
  SiteUsersDynamoDBTableARN:
    Description: "The ARN of the SiteUsers DynamoDB table."
    Value: !GetAtt SiteUsers.Arn
    Export: 
      Name: !Sub ${App}-${Env}-SiteUsersTableArn
