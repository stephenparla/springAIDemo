static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8081
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": "type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager"
                stat_prefix: ingress_http
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": "type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog"
                      log_format: # 🌟 FIXED: Added the required log_format wrapper
                        json_format:
                          time: "%START_TIME%"
                          ip: "%REQ(X-FORWARDED-FOR)%"
                          path: "%REQ(:PATH)%"
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": "type.googleapis.com/envoy.extensions.filters.http.router.v3.Router"
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        - match: { path: "/api/chatbot/actuator/health" }
                          route:
                            cluster: chatbot_service
                            prefix_rewrite: "/actuator/health"
                        - match: { path: "/chatbot/actuator/health" }
                          route:
                            cluster: chatbot_service
                            prefix_rewrite: "/actuator/health"
                        - match: { prefix: "/api/chatbot/" }
                          route:
                            cluster: chatbot_service
                            prefix_rewrite: "/"
                            timeout: 60s

  clusters:
    - name: chatbot_service
      connect_timeout: 2s
      type: STATIC
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: chatbot_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 8080
