Parameters:
  App:
    Type: String
  Env:
    Type: String
  Name:
    Type: String

Resources:
  # 1. IAM Role with DynamoDB Access
  LambdaCounterRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBIncrementAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:UpdateItem
                # Targets the table created by your Copilot addon
                Resource: !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${App}-${Env}-${Name}-UsersTable"

  # 2. The Python Lambda
  UserCounterFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: "index.lambda_handler"
      Runtime: "python3.12"
      Role: !GetAtt LambdaCounterRole.Arn
      Timeout: 10
      Environment:
        Variables:
          TABLE_NAME: !Sub "${App}-${Env}-${Name}-UsersTable"
      Code:
        ZipFile: |
          import boto3
          import os
          import json

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table(os.environ['TABLE_NAME'])

          def lambda_handler(event, context):
              try:
                  table.update_item(
                      Key={'StatId': 'total_unique_visitors'},
                      UpdateExpression="ADD visit_count :inc",
                      ExpressionAttributeValues={':inc': 1}
                  )
                  return {
                      'statusCode': 200,
                      'body': json.dumps({'status': 'incremented'})
                  }
              except Exception as e:
                  print(f"Error: {e}")
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': str(e)})
                  }

  # 3. Public URL for Envoy to hit
  UserCounterFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !Ref UserCounterFunction
      AuthType: NONE # Set to AWS_IAM if you use the signing filter in Envoy

  # 4. Permission for the URL to be public
  UserCounterFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref UserCounterFunction
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      FunctionUrlAuthType: NONE

Outputs:
  LambdaUrl:
    Description: "The URL to put in your Envoy config"
    Value: !GetAtt UserCounterFunctionUrl.FunctionUrl
