name: chatbot
type: Load Balanced Web Service

image:
  build: Dockerfile # Your Spring Boot app in root
  port: 8080

sidecars:
  envoy:
    port: 80
    image:
      build: ./envoy/Dockerfile # Copilot will go here and build it for you!

http:
  path: '/'
  target_port: 80 # ALB sends traffic to Envoy
  healthcheck: '/chatbot/actuator/health' # Envoy proxies this to Spring Boot
  success_codes: '200'
  healthy_threshold: 3
  unhealthy_threshold: 2
  interval: 15s
  timeout: 10s

secrets:
  ANTHROPIC_API_KEY: 'arn:aws:secretsmanager:us-east-1:470276446935:secret:ANTHROPIC_API_KEY-DWxFWR'
  USER_NAME: arn:aws:secretsmanager:us-east-1:470276446935:secret:USER_NAME-8apSQt
  USER_PASSWORD: arn:aws:secretsmanager:us-east-1:470276446935:secret:USER_PASSWORD-zuNi6K

environments:
  prod:
    count: 1
