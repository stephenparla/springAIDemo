Parameters:
  App:
    Type: String
  Env:
    Type: String
  Name:
    Type: String

Resources:
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${App}-${Env}-${Name}-UsersTable
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: StatId
          AttributeType: S
      KeySchema:
        - AttributeName: StatId
          KeyType: HASH

  LambdaCounterRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: "lambda.amazonaws.com"
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:UpdateItem
                  - dynamodb:GetItem
                Resource: !GetAtt UsersTable.Arn

  UserCounterFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: "index.lambda_handler"
      Runtime: "python3.12"
      Role: !GetAtt LambdaCounterRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref UsersTable
      Code:
        ZipFile: |
          import boto3, os, json
          def lambda_handler(event, context):
            try:
              table = boto3.resource('dynamodb').Table(os.environ['TABLE_NAME'])
              method = event.get('requestContext', {}).get('http', {}).get('method', 'GET')
    
              if method == 'GET':
                  response = table.get_item(Key={'StatId': 'total_unique_visitors'})
                  item = response.get('Item', {})
                  count = item.get('visitor_count', 0)
                  return {
                      'statusCode': 200,
                      'headers': {'Content-Type': 'application/json'},
                      'body': json.dumps({'count': int(count)})
                  }

              elif method == 'POST':
                  table.update_item(
                      Key={'StatId': 'total_unique_visitors'},
                      UpdateExpression="ADD visitor_count :inc",
                      ExpressionAttributeValues={':inc': 1}
                  )
                  return {'statusCode': 200, 'body': '{"status":"ok"}'}
            except Exception as e:
              return {'statusCode': 500, 'body': json.dumps({"error": str(e)})}

  UserCounterFunctionUrl:
    Type: AWS::Lambda::Url
    DependsOn: UserCounterFunction
    Properties:
      TargetFunctionArn: !Ref UserCounterFunction
      AuthType: NONE

  UserCounterFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref UserCounterFunction
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      FunctionUrlAuthType: NONE

  UserCounterFunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref UserCounterFunction
      Action: lambda:InvokeFunction
      Principal: "*"
      # This ensures it can ONLY be invoked via the URL
      SourceArn: !GetAtt UserCounterFunctionUrl.FunctionUrl

Outputs:
  CounterLambdaUrl:
    Value: !GetAtt UserCounterFunctionUrl.FunctionUrl
