spring:
  application:
    name: springai
  config:
    import: optional:file:.env[.properties]

  # Configure OpenRouter API key (replace with your actual API key)
  ai:
    openai:
      api-key: API_KEY

  # Set the base URL to OpenRouter's API endpoint
      base-url: 'https://openrouter.ai/api'
  
  # Specify the model you want to use (e.g., a free one, check the OpenRouter site for options)
      chat:
        options:
          model: meta-llama/llama-3.3-70b-instruct:free
