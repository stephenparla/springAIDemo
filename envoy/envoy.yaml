static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address: { address: 0.0.0.0, port_value: 80 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": ://googleapis.com
                stat_prefix: ingress_http
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        # 🤖 Route for Chatbot
                        - match: { prefix: "/chatbot" }
                          route:
                            cluster: chatbot_service
                            prefix_rewrite: "/" # Strip /chatbot before sending to Spring Boot
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": ://googleapis.com

  clusters:
    - name: chatbot_service
      connect_timeout: 0.25s
      type: STATIC
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: chatbot_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: 127.0.0.1, port_value: 8080 }
