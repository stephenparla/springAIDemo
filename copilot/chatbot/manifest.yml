name: chatbot
type: Load Balanced Web Service

# 1. Define global task size (Crucial for Sidecars)
cpu: 512
memory: 1024
platform: linux/amd64

# 2. Primary Spring Boot Container
image:
  build: Dockerfile
  port: 8080

# 3. Explicitly enable Task Execution Role
exec: true

# 4. Sidecar Configuration
sidecars:
  envoy:
    port: 80
    image:
      build: ./envoy/Dockerfile

# 5. Routing
http:
  path: '/'
  target_port: 80
  # 💡 CHANGE 1: Simplify health check to the root
  healthcheck: '/chatbot/actuator/health'
  # 💡 CHANGE 2: Add a massive grace period (300 seconds = 5 minutes)
  # This prevents ECS from killing the task while it's still booting
  grace_period: 300s

  # 💡 CHANGE 3: Increase health check timeouts so it doesn't fail early
  interval: 30s
  timeout: 10s
  healthy_threshold: 2
  unhealthy_threshold: 10 # Allow 10 failures before giving up

# 6. Placement (Match your Environment Manifest)
environments:
  prod:
    count: 1
    network:
      vpc:
        placement: 'public'
