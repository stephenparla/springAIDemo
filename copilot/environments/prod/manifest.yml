# Near the top of the file
platform: linux/amd64

name: prod
type: Environment

# 🌐 Network Configuration
network:
  vpc:
    # Use 'public' subnets for a cheaper portfolio setup (avoids $32/mo NAT Gateway)
    # If you want high security, leave this out to use default private subnets.
    placement: 'public'

# 🌐 Link your domain
cdn: true # Optional: Adds CloudFront for global speed and HTTPS
http:
  public:
    domain: theprohub.org
    # Copilot will automatically try to create an SSL certificate for this domain


# 📊 Monitoring (SDE 3 Best Practice)
observability:
  container_insights: true # Gives you CPU/RAM graphs in the AWS Console

secrets:
  ANTHROPIC_API_KEY: /copilot/${App}/${Env}/secrets/ANTHROPIC_API_KEY
  USER_PASSWORD: /copilot/${App}/${Env}/secrets/USER_PASSWORD
  USER_NAME: /copilot/${App}/${Env}/secrets/USER_NAME
