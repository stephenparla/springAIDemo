Parameters:
  App:
    Type: String
  Env:
    Type: String
  Name:
    Type: String

Resources:
  # 1. Fixed IAM Role to bypass CloudFormation errors
  LambdaQueryRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CloudWatchQueryAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:StartQuery
                  - logs:GetQueryResults
                Resource: "*"

  # 2. Python Lambda function that counts unique IPs
  UserCounterFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: "index.lambda_handler"
      Runtime: "python3.12"
      Role: !GetAtt LambdaQueryRole.Arn
      Timeout: 15
      Code:
        ZipFile: |
          import boto3
          import json
          import time
          from datetime import datetime, timezone

          logs_client = boto3.client('logs')

          def lambda_handler(event, context):
              query = """
              fields @timestamp, ip 


              | filter path like '/chatbot' or path like '/bedrock' or path like '/gaming'
              | filter path not like /\\.(css|js|png|jpg|jpeg|ico|svg)/
              | stats count_distinct(ip) as unique_guests
              """
          
              log_group = '/copilot/portfolio-backend-prod-chatbot'
              start_time = int(datetime(2026, 5, 1, tzinfo=timezone.utc).timestamp())
              end_time = int(datetime.now(timezone.utc).timestamp())
          
              start_query_response = logs_client.start_query(
                  logGroupName=log_group,
                  startTime=start_time,
                  endTime=end_time,
                  queryString=query
              )
          
              query_id = start_query_response['queryId']
              response = None
              while response is None or response['status'] in ['Running', 'Scheduled']:
                  time.sleep(0.5)
                  response = logs_client.get_query_results(queryId=query_id)
          
              total_users = 0
              if response['results']:
                  for row in response['results']:
                      for col in row:
                          if col['field'] == 'unique_guests':
                              total_users = int(col['value'])
          
              incoming_origin = event.get('headers', {}).get('origin', '')
              allowed_origins = [
                  'https://www.portfolio.bubble-sort.com',
                  'http://localhost:5173'
              ]
              response_origin = incoming_origin if incoming_origin in allowed_origins else allowed_origins

              return {
                  'statusCode': 200,
                  'headers': {
                      'Access-Control-Allow-Origin': response_origin,
                      'Access-Control-Allow-Methods': 'GET,OPTIONS',
                      'Content-Type': 'application/json'
                  },
                  'body': json.dumps({'totalUsers': total_users})
              }
