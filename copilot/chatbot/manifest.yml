name: chatbot
type: Load Balanced Web Service

# 💡 ADD THESE TWO LINES HERE (Top Level)
cpu: 512
memory: 1024

image:
  build: Dockerfile
  port: 8080

# 💡 ADD THIS LINE TO ENABLE THE ROLE
exec: true

sidecars:
  envoy:
    port: 80
    image:
      build: ./envoy/Dockerfile

http:
  path: '/'
  target_port: 80
  healthcheck: '/chatbot/actuator/health'
