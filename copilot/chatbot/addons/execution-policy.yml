Parameters:
  App:
    Type: String
  Env:
    Type: String
  # Fix: Name must follow the same Type pattern
  Name:
    Type: String

Resources:
  ECRRegistryPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: "Allow Fargate to pull chatbot and envoy images"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - "ecr:GetAuthorizationToken"
              - "ecr:BatchCheckLayerAvailability"
              - "ecr:GetDownloadUrlForLayer"
              - "ecr:BatchGetImage"
            Resource: "*"
      Roles:
        - !Ref ExecutionRole

Outputs:
  ECRPolicyArn:
    Value: !Ref ECRRegistryPolicy
