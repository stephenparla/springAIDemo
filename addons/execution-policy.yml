Parameters:
  App:
    Type: String
  Env:
    Type: String
  Name:
    Type: String

Resources:
  ECRRegistryPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: "Allow Fargate to pull chatbot and envoy images"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - "ecr:GetAuthorizationToken"
              - "ecr:BatchCheckLayerAvailability"
              - "ecr:GetDownloadUrlForLayer"
              - "ecr:BatchGetImage"
            Resource: "*"
      # 💡 CHANGE THIS: Use the internal Copilot name for the execution role
      Roles: [!Ref ExecutionRole]

# ⚠️ IF THE ERROR PERSISTS:
# Temporarily delete the 'Roles' section and the !Ref below.
# Copilot actually grants ECR permissions by default.
# You likely do not need this addon at all!
