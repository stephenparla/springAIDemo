static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address: { address: 0.0.0.0, port_value: 8081 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                http_filters:
                  # 1. Lua Filter for Unique Counter on successful Ping
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      inline_code: |
                        function envoy_on_request(request_handle)
                          -- Capture the path to use in the response phase
                          local path = request_handle:headers():get(":path")
                          request_handle:streamInfo():dynamicMetadata():set("envoy.filters.http.lua", "path", path)
                        end

                        function envoy_on_response(response_handle)
                          local path_meta = response_handle:streamInfo():dynamicMetadata():get("envoy.filters.http.lua")
                          if not path_meta then return end
                        
                          local path = path_meta["path"]
                          local status = response_handle:headers():get(":status")
                          local cookie = response_handle:headers():get("cookie") or ""
                        
                          -- Logic: Match ping path, success status, and no existing cookie
                          if string.find(path, "ping") and status == "200" and not string.find(cookie, "has_visited=true") then
                            -- Trigger Lambda Increment
                            local client_ip = response_handle:headers():get("x-forwarded-for") or "127.0.0.1"
                            -- Trim the IP if it contains a list of proxies
                            client_ip = string.gsub(client_ip, ",.*", "")
                        
                            response_handle:httpCall(
                              "lambda_counter_cluster",
                              {
                                [":method"] = "POST",
                                [":path"] = "/",
                                [":authority"] = "pjpg6bbgzttnp2eendrb4nkxye0hrkhu.lambda-url.us-east-1.on.aws",
                                ["content-type"] = "application/json"
                              },
                              '{"ip": "' .. client_ip .. '"}',
                              500
                            )
                            -- Set cookie to prevent re-counting
                            response_handle:headers():add("set-cookie", "has_visited=true; Max-Age=86400; Path=/; HttpOnly; SameSite=Lax")
                          end
                        end
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        - match: { path: "/actuator/health" }
                          direct_response: { status: 200, body: { inline_string: "{\"status\":\"UP\"}" } }
                        - match: { prefix: "/api/chatbot/" }
                          route:
                            cluster: chatbot_service
                            prefix_rewrite: "/"
                            timeout: 60s
                        - match: { path: "/api/visitor-count" }
                          route:
                            cluster: lambda_counter_cluster
                            prefix_rewrite: "/"
                            host_rewrite_literal: pjpg6bbgzttnp2eendrb4nkxye0hrkhu.lambda-url.us-east-1.on.aws

  clusters:
    - name: chatbot_service
      connect_timeout: 2s
      type: STATIC
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: chatbot_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: 127.0.0.1, port_value: 8080 }

    - name: lambda_counter_cluster
      connect_timeout: 0.25s
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: lambda_counter_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: pjpg6bbgzttnp2eendrb4nkxye0hrkhu.lambda-url.us-east-1.on.aws
                      port_value: 443
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          sni: pjpg6bbgzttnp2eendrb4nkxye0hrkhu.lambda-url.us-east-1.on.aws
          common_tls_context:
            validation_context:
              trusted_ca:
                filename: /etc/ssl/certs/ca-certificates.crt

